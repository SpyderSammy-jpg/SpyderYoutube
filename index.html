<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpyderYoutube | Secure Video Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    background: #111;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
}

.title {
    font-size: 18px;
    cursor: pointer;
}

/* HOME */
.center {
    text-align: center;
    margin-top: 120px;
}

.bigtitle {
    font-size: 48px;
    background: linear-gradient(to right, red, yellow);
    -webkit-background-clip: text;
    color: transparent;
}

.searchbar {
    width: 60%;
    padding: 15px;
    font-size: 18px;
    background: #333;
    border-radius: 10px;
    border: none;
    color: white;
}

/* VIEWER */
.viewer {
    display: none;
    height: calc(100vh - 50px);
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* SHORTS BUTTONS */
.arrow {
    position: absolute;
    right: 10px;
    font-size: 28px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    cursor: pointer;
}

.up { top: 40%; }
.down { top: 55%; }

/* BACK BUTTON */
.back {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #222;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* HISTORY PANEL */
.panel {
    position: fixed;
    right: 0;
    top: 50px;
    width: 240px;
    height: calc(100vh - 50px);
    background: #111;
    overflow-y: auto;
    transition: transform 0.3s;
}

.panel.hidden {
    transform: translateX(100%);
}

.item {
    padding: 8px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.controls {
    padding: 8px;
    border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="title">SpyderYoutube Control Panel</div>
    <button onclick="togglePanel()">Toggle History</button>
</div>

<!-- HOME -->
<div id="home" class="center">
    <div class="bigtitle">SpyderYoutube</div>
    <p>Now with SafeShareTV and Youtube Shorts Partnership!</p>

    <input id="search" class="searchbar"
    placeholder="Paste a YouTube URL to begin"
    onkeypress="handleEnter(event)">
</div>

<!-- VIEW -->
<div id="viewer" class="viewer">
    <iframe id="frame"></iframe>

    <div id="upArrow" class="arrow up" onclick="prevShort()">⬆️</div>
    <div id="downArrow" class="arrow down" onclick="nextShort()">⬇️</div>
</div>

<div class="back" onclick="goHome()">Back to Home</div>

<!-- HISTORY -->
<div id="panel" class="panel">
    <div class="controls">
        <button onclick="clearHistory()">Clear</button>
    </div>
    <div id="history"></div>
</div>

<script>
let historyList = JSON.parse(localStorage.getItem("h") || "[]");
let shortStack = [];
let currentIndex = -1;
let isShort = false;

/* ENTER */
function handleEnter(e) {
    if (e.key === "Enter") {
        let url = document.getElementById("search").value.trim();

        if (!url.includes("youtube")) {
            alert("Only YouTube URLs allowed");
            return;
        }

        openVideo(url);
    }
}

/* EXTRACT ID */
function getID(url) {
    try {
        let u = new URL(url);
        if (u.hostname === "youtu.be") return u.pathname.slice(1);
        if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1];
        return u.searchParams.get("v");
    } catch {
        return null;
    }
}

/* OPEN VIDEO */
function openVideo(url) {
    let id = getID(url);
    if (!id) return alert("Invalid URL");

    isShort = url.includes("shorts");

    let embed = `https://www.yout-ube.com/embed/${id}`;

    document.getElementById("frame").src = embed;

    document.getElementById("home").style.display = "none";
    document.getElementById("viewer").style.display = "block";

    document.getElementById("upArrow").style.display = isShort ? "block" : "none";
    document.getElementById("downArrow").style.display = isShort ? "block" : "none";

    saveHistory(id);

    if (isShort) {
        shortStack.push(id);
        currentIndex = shortStack.length - 1;
    }
}

/* SHORTS NAV */
function nextShort() {
    let id = Math.random().toString(36).substring(2, 13);
    loadShort(id);
}

function prevShort() {
    if (currentIndex > 0) {
        currentIndex--;
        loadShort(shortStack[currentIndex]);
    }
}

function loadShort(id) {
    document.getElementById("frame").src =
        `https://www.yout-ube.com/embed/${id}`;

    shortStack.push(id);
    currentIndex = shortStack.length - 1;
}

/* HOME */
function goHome() {
    document.getElementById("viewer").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.getElementById("frame").src = "";
}

/* HISTORY */
function saveHistory(id) {
    historyList.unshift(id);
    localStorage.setItem("h", JSON.stringify(historyList.slice(0, 20)));
    renderHistory();
}

function renderHistory() {
    let el = document.getElementById("history");
    el.innerHTML = "";

    historyList.forEach(i => {
        let d = document.createElement("div");
        d.className = "item";
        d.innerText = i;
        d.onclick = () => openVideo("https://youtube.com/watch?v=" + i);
        el.appendChild(d);
    });
}

function clearHistory() {
    historyList = [];
    localStorage.removeItem("h");
    renderHistory();
}

/* PANEL */
function togglePanel() {
    document.getElementById("panel").classList.toggle("hidden");
}

/* INIT */
renderHistory();
</script>

</body>
</html>
