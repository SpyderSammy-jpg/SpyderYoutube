<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="tab-title">Google Classroom</title>
<link rel="icon" id="tab-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    background: #111;
    padding: 10px 20px;
}

.title {
    font-size: 20px;
    cursor: pointer;
}

button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* HOME */
.center {
    text-align: center;
    margin-top: 120px;
}

.bigtitle {
    font-size: 50px;
    background: linear-gradient(to right, red, yellow);
    -webkit-background-clip: text;
    color: transparent;
}

.searchbar {
    width: 60%;
    padding: 15px;
    font-size: 18px;
    background: #333;
    border-radius: 10px;
    border: none;
    color: white;
}

/* VIEW */
.viewer {
    display: none;
    height: calc(100vh - 50px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ADMIN PANEL */
.admin {
    display: none;
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    padding: 20px;
    border: 1px solid #333;
}

/* SIDE PANEL */
.panel {
    position: fixed;
    right: 0;
    top: 50px;
    width: 220px;
    height: calc(100vh - 50px);
    background: #111;
    overflow-y: auto;
    padding: 10px;
}

.item {
    padding: 6px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="title" onclick="titleClick()">Classes</div>

    <div>
        <button onclick="showHome()">YouTube</button>
        <button onclick="openProxy()">Proxy</button>
        <button onclick="toggleDisguise()">🧿</button>
    </div>
</div>

<!-- HOME -->
<div id="home" class="center">
    <div class="bigtitle">SpyderYoutube</div>
    <p>Now with SafeShareTV and Youtube Shorts Partnership!</p>

    <input id="search" class="searchbar"
    placeholder="Paste URL or type keywords..."
    onkeypress="handleEnter(event)">
</div>

<!-- VIEW -->
<div id="viewer" class="viewer">
    <iframe id="frame"></iframe>
</div>

<!-- ADMIN -->
<div id="admin" class="admin">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" placeholder="Password" type="password"><br><br>
    <button onclick="login()">Login</button>
</div>

<!-- SIDE PANEL -->
<div class="panel">
    <h4>History</h4>
    <div id="history"></div>

    <h4>Bookmarks</h4>
    <div id="bookmarks"></div>
</div>

<script>
let clicks = 0;
let disguised = true;
let currentID = "";

/* 3 CLICK ADMIN */
function titleClick() {
    clicks++;
    if (clicks >= 3) {
        document.getElementById("admin").style.display = "block";
        clicks = 0;
    }
}

/* LOGIN */
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "SpyderSammy" && p === "00010698") {
        alert("Access Granted");
        openAdminPanel();
    } else {
        alert("Wrong login");
    }
}

function openAdminPanel() {
    let cmd = prompt("Enter global command:");
    if (cmd) {
        alert("Broadcast: " + cmd);
    }
}

/* DISGUISE MODE */
function toggleDisguise() {
    disguised = !disguised;

    if (disguised) {
        document.title = "Google Classroom";
    } else {
        document.title = "SpyderYoutube";
    }
}

/* SEARCH */
function handleEnter(e) {
    if (e.key === "Enter") {
        let val = document.getElementById("search").value;

        if (val.includes("youtube")) {
            loadURL(val);
        } else {
            search(val);
        }
    }
}

function search(q) {
    document.getElementById("frame").src =
    `https://www.youtube.com/embed?listType=search&list=${q}`;

    showViewer();
    saveHistory(q);
}

function loadURL(url) {
    let id = extractID(url);
    currentID = id;

    document.getElementById("frame").src =
    `https://www.youtube.com/embed/${id}`;

    showViewer();
    saveHistory(id);
}

function extractID(url) {
    try {
        let u = new URL(url);
        return u.searchParams.get("v") || u.pathname.split("/").pop();
    } catch {
        return null;
    }
}

/* VIEW SWITCH */
function showViewer() {
    document.getElementById("home").style.display = "none";
    document.getElementById("viewer").style.display = "block";
}

function showHome() {
    document.getElementById("viewer").style.display = "none";
    document.getElementById("home").style.display = "block";
}

/* PROXY */
function openProxy() {
    showViewer();
    document.getElementById("frame").src =
    "https://spyder-network.vercel.app";
}

/* STORAGE */
function saveHistory(x) {
    let h = JSON.parse(localStorage.getItem("h")||"[]");
    h.unshift(x);
    localStorage.setItem("h", JSON.stringify(h.slice(0,15)));
    render();
}

function render() {
    let h = JSON.parse(localStorage.getItem("h")||"[]");
    let el = document.getElementById("history");
    el.innerHTML = "";

    h.forEach(i=>{
        let d=document.createElement("div");
        d.className="item";
        d.innerText=i;
        d.onclick=()=>search(i);
        el.appendChild(d);
    });
}

render();
</script>

</body>
</html>
