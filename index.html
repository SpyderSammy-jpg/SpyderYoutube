<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Classroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin: 0; background: black; color: white; font-family: Arial, sans-serif; overflow: hidden; }
.navbar { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
.title { font-size: 18px; font-weight: bold; color: #ff0000; }
.center { text-align: center; margin-top: 100px; }
.bigtitle { font-size: 48px; background: linear-gradient(to right, #ff0000, #ffcc00); -webkit-background-clip: text; color: transparent; font-weight: 900; margin-bottom: 20px; }
.search-container { width: 60%; margin: 0 auto; position: relative; }
.searchbar { width: 100%; padding: 15px; font-size: 18px; background: #222; border-radius: 30px; border: 1px solid #444; color: white; outline: none; }

.suggestions { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
.chip { background: #333; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
.chip:hover { background: #ff0000; border-color: #ff0000; }

.viewer { display: none; height: calc(100vh - 50px); position: relative; background: #000; }
iframe { width: 100%; height: 100%; border: none; }

.arrow { position: absolute; right: 20px; font-size: 32px; background: rgba(0,0,0,0.6); padding: 15px; cursor: pointer; border-radius: 50%; user-select: none; z-index: 10; border: 1px solid #444; }
.up { top: 35%; }
.down { top: 55%; }

.back { position: fixed; bottom: 20px; left: 20px; background: #ff0000; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; z-index: 100; }
.panel { position: fixed; right: 0; top: 50px; width: 260px; height: calc(100vh - 50px); background: #0a0a0a; border-left: 1px solid #222; transition: 0.3s; z-index: 20; overflow-y: auto; }
.panel.hidden { transform: translateX(100%); }
.item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 12px; color: #aaa; }
</style>
</head>

<body>
<div id="main-ui">
    <div class="navbar">
        <div class="title">SpyderYoutube</div>
        <button onclick="togglePanel()">History</button>
    </div>

    <div id="home" class="center">
        <div class="bigtitle">SpyderYoutube</div>
        <div class="search-container">
            <input id="search" class="searchbar" placeholder="Paste YouTube Link" onkeypress="handleEnter(event)">
            <div class="suggestions">
                <div class="chip" onclick="loadVideo('L_jWHffIx5E')">Minecraft</div>
                <div class="chip" onclick="loadVideo('jfKfPfyJRdk')">Lo-Fi Radio</div>
                <div class="chip" onclick="loadVideo('3JZ_D3ELwOQ')">Satisfying</div>
                <div class="chip" onclick="loadVideo('aqz-KE-bpKQ')">Memes</div>
            </div>
        </div>
    </div>

    <div id="viewer" class="viewer">
        <iframe id="frame" allow="autoplay; fullscreen; picture-in-picture"></iframe>
        <div class="arrow up" onclick="navShort(-1)">⬆️</div>
        <div class="arrow down" onclick="navShort(1)">⬇️</div>
    </div>

    <div class="back" onclick="goHome()">🏠 Home</div>

    <div id="panel" class="panel hidden">
        <div id="history"></div>
    </div>
</div>

<script>
let historyList = JSON.parse(localStorage.getItem("h") || "[]");
// List of real video IDs so arrows always work
let videoPool = ["L_jWHffIx5E", "jfKfPfyJRdk", "3JZ_D3ELwOQ", "aqz-KE-bpKQ", "dQw4w9WgXcQ"];
let currentIndex = 0;

function handleEnter(e) {
    if (e.key === "Enter") {
        let val = document.getElementById("search").value.trim();
        let id = extractID(val);
        if (id) {
            if (!videoPool.includes(id)) videoPool.push(id);
            currentIndex = videoPool.indexOf(id);
            loadVideo(id);
        } else { alert("Invalid Link! Copy the full URL."); }
    }
}

function extractID(url) {
    // Better logic to catch standard, mobile, and shorts IDs
    let id = "";
    if (url.includes("v=")) {
        id = url.split("v=")[1].split("&")[0];
    } else if (url.includes("shorts/")) {
        id = url.split("shorts/")[1].split("?")[0].split("/")[0];
    } else if (url.includes("youtu.be/")) {
        id = url.split("youtu.be/")[1].split("?")[0];
    }
    return (id.length >= 11) ? id.substring(0, 11) : null;
}

function loadVideo(id) {
    if (!id) return;
    // CRITICAL FIX: No more {id} text in URL
    const cleanUrl = `https://yout-ube.com{id}?autoplay=1&rel=0`;
    document.getElementById("frame").src = cleanUrl;
    document.getElementById("home").style.display = "none";
    document.getElementById("viewer").style.display = "block";
    saveHistory(id);
}

function navShort(step) {
    currentIndex += step;
    if (currentIndex < 0) currentIndex = videoPool.length - 1;
    if (currentIndex >= videoPool.length) currentIndex = 0;
    loadVideo(videoPool[currentIndex]);
}

function goHome() {
    document.getElementById("viewer").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.getElementById("frame").src = "";
}

function saveHistory(id) {
    if(!historyList.includes(id)) {
        historyList.unshift(id);
        localStorage.setItem("h", JSON.stringify(historyList.slice(0, 20)));
        renderHistory();
    }
}

function renderHistory() {
    let el = document.getElementById("history");
    el.innerHTML = "";
    historyList.forEach(i => {
        let d = document.createElement("div");
        d.className = "item";
        d.innerText = "Video: " + i;
        d.onclick = () => loadVideo(i);
        el.appendChild(d);
    });
}

function togglePanel() { document.getElementById("panel").classList.toggle("hidden"); }

// BOSS KEY: Shift + B
document.addEventListener('keydown', function(e) {
    if (e.shiftKey && e.key === 'B') {
        window.location.href = "https://wikipedia.org";
    }
});

renderHistory();
</script>
</body>
</html>
